messages:
  # CANNON
  ShipAttackCannon:
    name: 'ship:attack:cannon'
    contentType: application/json
    summary: Disparar el cañón principal a una coordenada.
    payload:
      type: object
      required: [matchId, shipId, target]
      properties:
        matchId: { type: string, format: uuid }
        shipId: { type: string, format: uuid }
        target:
          type: object
          properties:
            x: { type: integer, example: 10 }
            y: { type: integer, example: 5 }

  ShipAttacked:
    name: 'ship:attacked'
    contentType: application/json
    summary: Notifica el resultado de un ataque de cañón.
    payload:
      type: object
      required: [attackerId, hit, target, ammoCurrent]
      properties:
        attackerId: { type: string, format: uuid }
        hit: { type: boolean, description: "Indica si el disparo impactó en un barco." }
        target: { type: object, properties: { x: {type: integer}, y: {type: integer} } }
        targetHp: 
          type: integer
          nullable: true
          description: "Nuevo HP del objetivo si hubo impacto."
        ammoCurrent: { type: integer, example: 3 }

  ShipAttackTorpedo:
    name: 'ship:attack:torpedo'
    contentType: application/json
    summary: Lanzar un torpedo en la dirección actual del barco.
    payload:
      type: object
      required: [matchId, shipId]
      properties:
        matchId: { type: string, format: uuid }
        shipId: { type: string, format: uuid }

  ProjectileLaunched:
    name: 'projectile:launched'
    contentType: application/json
    summary: Notifica que un proyectil dinámico ha sido desplegado en el tablero.
    payload:
      type: object
      required: [id, lifeDistance, matchId, ownerId,type,vectorX,vectorY, x, y, ammoCurrent]
      properties:
        id: { type: string, format: uuid}
        lifeDistance: {type: integer, minimun: 0}
        matchId: { type: string, format: uuid}
        ownerId: { type: string, format: uuid}
        type: {string, enum: [MINE, TORPEDO]}
        vectorX: {type: integer}
        vectorY: {type: integer, minimun: 0}
        x: {type: integer, minimun: 0}
        y: {type: integer, minimun: 0}
        ammoCurrent: { type: integer, example: 2 }

  ShipAttackMine:
    name: 'ship:attack:mine'
    contentType: application/json
    summary: Colocar una mina en una casilla adyacente.
    payload:
      type: object
      required: [matchId, shipId, target]
      properties:
        matchId: { type: string, format: uuid }
        shipId: { type: string, format: uuid }
        target: { type: object, properties: { x: {type: integer}, y: {type: integer} } }

  ProjectileHitShip:
    name: 'projectile:hit'
    contentType: application/json
    summary: Notifica que un proyectil ha impactado con un barco.
    payload:
      type: object
      required: [shipId, proyectilColisionado, newHp]
      properties:
        shipId: {type: string, format: uuid}
        proyectilColisionado: {type: string, format: uuid}
        newHp: {type: integer}

  ProjectileUpdate:
    name: 'projectile:update'
    contentType: application/json
    summary: Notifica la actualización de un proyectil desplegado y visible.
    payload:
      type: object
      required: [projectile, status]
      properties:
        projectile: {type: string, format: uuid}
        status: {type: string, enum: [ENDOFLIFE, ALIVE], description: ENDOFLIFE significa que el proyectil va a dejar de existir en el siguiente turno. ALIVE significa que sigue vivo}
        x: {type: integer, minimun: 0}
        y: {type: integer, minimun: 0}
        lifeDistance: {type: integer, minimun: 0}

