messages:
  ShipMove:
    name: 'ship:move'
    contentType: application/json
    summary: El jugador solicita mover un barco una casilla en una dirección.
    payload:
      type: object
      required: [matchId, shipId, direction]
      properties:
        matchId:
          type: string
          format: uuid
        shipId:
          type: string
          format: uuid
          description: ID de la instancia del barco a mover.
        direction:
          type: string
          enum: [N, S, E, W]
          description: Dirección del movimiento.

  ShipMoved:
    name: 'ship:moved'
    contentType: application/json
    summary: Notifica a la sala que un barco se ha movido exitosamente.
    payload:
      type: object
      required: [shipId, position, fuelReserve, userId]
      properties:
        shipId:
          type: string
          format: uuid
        position:
          type: object
          properties:
            x: { type: integer, example: 5 }
            y: { type: integer, example: 6 }
        fuelReserve:
          type: integer
          description: Nueva reserva de combustible (MP) del jugador tras el gasto.
          example: 9
        userId:
          type: string
          format: uuid
          description: ID del usuario que realizó el movimiento.

  ShipRotate:
    name: 'ship:rotate'
    contentType: application/json
    summary: El jugador solicita rotar un barco 90 grados (horario o antihorario).
    payload:
      type: object
      required: [matchId, shipId, degrees]
      properties:
        matchId: { type: string, format: uuid }
        shipId: { type: string, format: uuid, description: ID de la instancia del barco a rotar. }
        degrees: { type: integer, enum:[90, -90], description: "Grados de rotación (90 a la derecha, -90 a la izquierda)." }

  ShipRotated:
    name: 'ship:rotated'
    contentType: application/json
    summary: Notifica a la sala que un barco ha rotado exitosamente.
    payload:
      type: object
      required: [shipId, orientation, fuelReserve, userId]
      properties:
        shipId: { type: string, format: uuid }
        orientation: { type: string, enum: [N, S, E, W] }
        fuelReserve: { type: integer, description: "Nueva reserva de combustible tras gastar MP." }
        userId: { type: string, format: uuid }
