messages:
  GameJoin:
    name: 'game:join'
    contentType: application/json
    summary: El cliente solicita entrar en la sala de una partida específica.
    payload:
      type: object
      required: [matchId]
      properties:
        matchId:
          type: string
          format: uuid

  GameJoined:
    name: 'game:joined'
    contentType: application/json
    summary: Confirmación de que el servidor ha unido el socket a la sala del match.
    payload:
      type: object
      required: [matchId]
      properties:
        matchId: #Quiza podria poner esto para no repetirlo...
          type: string
          format: uuid

  MatchPauseRequest:
    name: 'match:pause_request'
    contentType: application/json
    summary: Solicita pausar la partida actual. Requiere aceptación del oponente (NO IMPLEMENTADO).
    payload:
      type: object
      required: [matchId]
      properties:
        matchId:
          type: string
          format: uuid

  MatchPauseRequested:
    name: 'match:pause_requested'
    contentType: application/json
    summary: Notifica al oponente que se ha solicitado una pausa.
    payload:
      type: object
      required: [from]
      properties:
        from:
          type: string
          description: Nombre del usuario que solicita la pausa.
          example: "oscar_tester"

  GameError:
    name: 'game:error'
    contentType: application/json
    summary: Mensaje genérico de error enviado por el servidor ante acciones inválidas.
    payload:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: "No es tu turno"

  MatchVisionUpdate:
    name: 'match:vision_update'
    contentType: application/json
    summary: Envía a un jugador su visión actualizada del tablero de forma individual.
    payload:
      type: object
      required: [myFleet, proyEnemigos, proyPropios, visibleEnemyFleet, visionRange]
      properties:
        myFleet:
          type: array
          items:
            type: object
            required: [id, x, y, orientation, currentHp, hitCells, effectiveWidth, effectiveHeight, isSunk]
            properties:
              id: { type: string, format: uuid }
              x: { type: integer, minimum: 0 }
              y: { type: integer, minimum: 0 }
              orientation: { type: string, enum:[N, S, E, W] }
              currentHp: { type: integer, minimum: 0 }
              hitCells: { type: array, items: { type: object, properties: { x: { type: integer }, y: { type: integer } } } }
              visionRange: { type: integer, minimum: 1 }
              effectiveWidth: { type: integer, minimum: 1 }
              effectiveHeight: {type: integer, minimum: 1 }
              isSunk: { type: boolean }
              weapons:
                type: array
                items:
                  type: object
                  properties:
                    type: { type: string, enum: [CANNON, TORPEDO, MINE] }
                    name: { type: string }
                    apCost: { type: integer }
                    range: { type: integer, nullable: true }
                    damage: { type: integer }
        proyEnemigos:
          type: array
          items:
            type: object
            required: [id, lifeDistance, matchId, ownerId,type,vectorX,vectorY,x,y]
            properties: 
              id: { type: string, format: uuid}
              lifeDistance: {type: integer, minimun: 0}
              matchId: { type: string, format: uuid}
              ownerId: { type: string, format: uuid}
              type: {string, enum: [MINE, TORPEDO]}
              vectorX: {type: integer}
              vectorY: {type: integer, minimun: 0}
              x: {type: integer, minimun: 0}
              y: {type: integer, minimun: 0}
        proyPropios:
          type: array
          items:
            type: object
            required: [id, lifeDistance, matchId, ownerId,type,vectorX,vectorY,x,y]
            properties: 
              id: { type: string, format: uuid}
              lifeDistance: {type: integer, minimun: 0}
              matchId: { type: string, format: uuid}
              ownerId: { type: string, format: uuid}
              type: {string, enum: [MINE, TORPEDO]}
              vectorX: {type: integer}
              vectorY: {type: integer, minimun: 0}
              x: {type: integer, minimun: 0}
              y: {type: integer, minimun: 0}
        visibleEnemyFleet:
          type: array
          items:
            type: object
            # Mismas propiedades que myFleet
            required: [id, x, y, orientation, currentHp, hitCells, effectiveWidth, effectiveHeight, isSunk]
            properties:
              id: { type: string, format: uuid }
              x: { type: integer, minimum: 0 }
              y: { type: integer, minimum: 0 }
              orientation: { type: string, enum: [N, S, E, W] }
              currentHp: { type: integer, minimum: 0 }
              hitCells: { type: array, items: { type: object, properties: { x: { type: integer }, y: { type: integer } } } }
              visionRange: { type: integer, minimum: 1 }
              effectiveWidth: { type: integer, minimum: 1 }
              effectiveHeight: {type: integer, minimum: 1 }
              isSunk: { type: boolean }
              weapons:
                type: array
                items:
                  type: object
                  properties:
                    type: { type: string, enum: [CANNON, TORPEDO, MINE] }
                    name: { type: string }
                    apCost: { type: integer }
                    range: { type: integer, nullable: true }
                    damage: { type: integer }
          
  MatchPauseAccept:
    name: 'match:pause_accept'
    contentType: application/json
    summary: El jugador acepta la solicitud de pausa del oponente.
    payload:
      type: object
      required: [matchId]
      properties:
        matchId:
          type: string
          format: uuid

  MatchPauseReject:
    name: 'match:pause_reject'
    contentType: application/json
    summary: El jugador rechaza la solicitud de pausa del oponente.
    payload:
      type: object
      required: [matchId]
      properties:
        matchId:
          type: string
          format: uuid

  MatchPauseRejected:
    name: 'match:pause_rejected'
    contentType: application/json
    summary: Notifica al solicitante que el oponente ha rechazado la pausa.
    payload:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: "El oponente ha rechazado la solicitud de pausa."

  MatchPaused:
    name: 'match:paused'
    contentType: application/json
    summary: Notifica a la sala que la partida ha entrado en estado de pausa (WAITING).
    payload:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: "La partida ha sido pausada por mutuo acuerdo."
            
