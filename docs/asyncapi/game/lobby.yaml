messages:
  LobbyCreate:
    name: 'lobby:create'
    contentType: application/json
    summary: Solicitud de creación de sala.
    payload:
      type: object
      additionalProperties: false
      description: No requiere parámetros, se identifica al usuario por el token del socket.

  LobbyCreated:
    name: 'lobby:created'
    contentType: application/json
    summary: Confirmación de sala creada.
    payload:
      type: object
      required: [codigo]
      properties:
        codigo:
          type: string
          pattern: '^[A-Z0-9]{6}$'
          example: "XD6769"

  LobbyJoin:
    name: 'lobby:join'
    contentType: application/json
    summary: Solicitud para unirse a una sala existente mediante código.
    payload:
      type: object
      required: [codigo]
      properties:
        codigo:
          type: string
          example: "XD6769"

  LobbyError:
    name: 'lobby:error'
    contentType: application/json
    summary: Informa de un fallo en la gestión del lobby (sala no encontrada o llena).
    payload:
      type: object
      properties:
        message:
          type: string
          example: "Lobby no encontrado"

  MatchReady:
    name: 'match:ready'
    contentType: application/json
    summary: Notifica a ambos jugadores que la partida ha sido creada y pueden empezar.
    payload:
      type: object
      required: [matchId, status, turnNumber]
      properties:
        matchId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PLAYING]
        turnNumber:
          type: integer
          example: 1

  MatchStartInfo:
    name: 'match:startInfo'
    contentType: application/json
    summary: Contiene el estado general de la partida y la información privada de los barcos del jugador.
    payload:
      type: object
      required:
        - matchInfo
        - playerFleet
        - ammo
        - fuel
      properties:
        matchInfo:
          type: object
          required: [matchId, status, currentTurnPlayer, turnNumber, mapTerrain, yourId]
          properties:
            matchId:
              type: string
              format: uuid
            status:
              type: string
              enum: [WAITING, PLAYING, FINISHED]
            currentTurnPlayer:
              type: string
              format: uuid
              description: id del usuario que empieza a jugar
            yourId:
              type: string
              format: uuid
              description: id del ususario actual
            turnNumber:
              type: integer
              example: 1
            mapTerrain:
              type: object
              required: [size, obstacles]
              properties:
                size:
                  type: integer
                  example: 15
                obstacles:
                  type: array
                  items:
                    type: object
        ammo:
          type: integer
          example: 5
        fuel:
          type: integer
          example: 10
        playerFleet:
          type: array
          description: Lista de barcos del jugador (traducida a su perspectiva Sur).
          items:
            type: object
            required: [id, x, y, orientation, currentHp, hitCells, isSunk]
            properties:
              id:
                type: string
                format: uuid
              x:
                type: integer
                minimum: 0
              y:
                type: integer
                minimum: 0
              orientation:
                type: string
                enum: [N, S, E, W]
              currentHp:
                type: integer
                minimum: 0
              hitCells:
                type: array
                items:
                  type: object
                  properties:
                    x:
                      type: integer
                    y:
                      type: integer
              isSunk:
                type: boolean
        enemyFleet:
          type: array
          description: Lista de barcos enemigos visibles inicialmente.
          items:
            type: object
            required: [id, x, y, orientation, currentHp, hitCells, isSunk]
            properties:
              id:
                type: string
                format: uuid
              x:
                type: integer
                minimum: 0
              y:
                type: integer
                minimum: 0
              orientation:
                type: string
                enum: [N, S, E, W]
              currentHp:
                type: integer
                minimum: 0
              hitCells:
                type: array
                items:
                  type: object
                  properties:
                    x:
                      type: integer
                    y:
                      type: integer
              isSunk:
                type: boolean