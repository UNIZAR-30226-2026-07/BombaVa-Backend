ValidationError:
  type: object
  properties:
    errors:
      type: array
      items:
        type: object
        properties:
          msg:
            type: string
          path:
            type: string

AuthResponse:
  type: object
  properties:
    token:
      type: string

User:
  type: object
  properties:
    id:
      type: string
      format: uuid
    username:
      type: string
      example: oscar_tester
    email:
      type: string
      format: email
      example: oscar@test.com
    elo_rating:
      type: integer
      example: 1200
    created_at:
      type: string
      format: date-time

ShipTemplate:
  type: object
  properties:
    slug: { type: string, example: "lancha" }
    name: { type: string, example: "Lancha" }
    width: { type: integer, example: 1 }
    height: { type: integer, example: 1 }
    baseMaxHp: { type: integer, example: 20 }
    supplyCost: { type: integer, example: 10 }
    baseStats: { type: object }

UserShipWeapon:
  type: object
  properties:
    user_ship_id: { type: string, format: uuid }
    weapon_slug: { type: string, example: "cannon-base" }

UserShip:
  type: object
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    templateSlug: { type: string, example: "lancha" }
    level: { type: integer, example: 1 }
    customStats: { type: object }
    ShipTemplate: 
      $ref: '#/ShipTemplate'
    WeaponTemplates:
      type: array
      items:
        allOf:
          - $ref: '#/WeaponTemplate'
          - type: object
            properties:
              UserShipWeapon:
                $ref: '#/UserShipWeapon'

FleetDeck:
  type: object
  properties:
    id: { type: string, format: uuid }
    deckName: { type: string, example: "Mazo Principal" }
    isActive: { type: boolean, example: true }
    shipIds:
      type: array
      items:
        type: object
        properties:
          userShipId: { type: string, format: uuid }
          position:
            type: object
            properties:
              x: { type: integer, example: 5 }
              y: { type: integer, example: 2 }
          orientation: { type: string, enum: [N, S, E, W], example: "N" }

Match:
  type: object
  properties:
    id:
      type: string
      format: uuid
    status:
      type: string
      enum: [WAITING, PLAYING, FINISHED]
      example: "FINISHED"
    current_turn_player_id:
      type: string
      format: uuid
    turn_number:
      type: integer
      example: 15
    map_terrain:
      type: object
      properties:
        size: { type: integer, example: 15 }
    created_at:
      type: string
      format: date-time
    MatchPlayers:
      type: array
      items:
        type: object
        properties:
          side: { type: string, enum: [NORTH, SOUTH] }
          fuel_reserve: { type: integer }
          ammo_current: { type: integer }
          user_id: { type: string, format: uuid }

WeaponTemplate:
  type: object
  properties:
    slug: { type: string, example: "cannon-base" }
    name: { type: string, example: "Cañón Estándar" }
    description: { type: string, example: "Arma de fuego directo fiable." }
    type: { type: string, enum: [CANNON, TORPEDO, MINE] }
    damage: { type: integer, example: 10 }
    apCost: { type: integer, example: 2 }
    range: { type: integer, example: 4, nullable: true }
    lifeDistance: { type: integer, example: 0, nullable: true }